spring.application.name=ai-money-assistant

# ---- Database (local PostgreSQL) ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/moneydb}
spring.datasource.username=money
spring.datasource.password=money

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

# ---- Cache ----
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=1h

# ---- AI (Google Gemini — free tier, OpenAI-compatible endpoint) ----
# Spring AI's OpenAI client, pointed at Gemini's OpenAI-compatible API.
# Get a free key (no credit card) at https://aistudio.google.com/apikey
spring.ai.openai.api-key=${GEMINI_API_KEY:}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com
spring.ai.openai.chat.completions-path=/v1beta/openai/chat/completions
spring.ai.openai.chat.options.model=gemini-2.0-flash
spring.ai.openai.chat.options.temperature=0.2
# Gemini's OpenAI layer is chat-only here; we don't use embeddings, so disable that autoconfig.
spring.ai.openai.embedding.enabled=false

# ---- API docs ----
springdoc.swagger-ui.path=/swagger-ui.html

# Seed a handful of demo expenses on first run so the chat has data to query
app.seed-demo-data=true

logging.level.org.springframework.ai=INFO
